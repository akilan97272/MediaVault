<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediaVault — Admin Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700&family=Instrument+Serif:ital@1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <script>(function(){const t=localStorage.getItem('mv-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
    <style>
        body { min-height: 100dvh; }

        .adm-wrap {
            position: relative; z-index: 1;
            max-width: 1200px; margin: 0 auto;
            padding: 20px 20px 60px;
            display: flex; flex-direction: column; gap: 20px;
        }

        /* ── Header ── */
        .adm-header {
            display: flex; align-items: center; gap: 12px;
            padding: 14px 18px; border-radius: 18px;
            background: var(--glass-bg);
            backdrop-filter: blur(var(--glass-blur)) saturate(180%);
            -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(180%);
            border: 1px solid var(--glass-border);
            box-shadow: 0 1px 0 var(--glass-shine) inset, 0 8px 32px var(--glass-shadow);
        }
        .adm-back {
            display: flex; align-items: center; gap: 6px;
            text-decoration: none; color: var(--text-2);
            font-size: 0.86rem; font-weight: 500;
            padding: 7px 12px; border-radius: 9px;
            border: 1px solid var(--glass-border);
            background: var(--glass-bg); transition: background 0.15s, color 0.15s;
        }
        .adm-back:hover { background: rgba(128,128,128,0.12); color: var(--text-1); }
        .adm-back svg { width: 15px; height: 15px; }
        .adm-title {
            flex: 1; text-align: center;
            font-family: 'Instrument Serif', serif; font-style: italic;
            font-size: 1.35rem; color: var(--text-1);
        }
        .adm-header-right { display: flex; align-items: center; gap: 8px; }
        .adm-refresh {
            width: 34px; height: 34px; border-radius: 9px;
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            color: var(--text-2); cursor: pointer; font-size: 1.1rem;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.15s, transform 0.3s;
        }
        .adm-refresh:hover { background: rgba(128,128,128,0.12); color: var(--text-1); }
        .adm-refresh.spinning { animation: spin 0.6s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Stat cards ── */
        .stat-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
        }
        .stat-card {
            padding: 20px 18px; border-radius: 18px;
            display: flex; align-items: center; gap: 14px;
            background: var(--glass-bg);
            backdrop-filter: blur(var(--glass-blur)) saturate(180%);
            -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(180%);
            border: 1px solid var(--glass-border);
            box-shadow: 0 1px 0 var(--glass-shine) inset, 0 8px 24px var(--glass-shadow);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .stat-card:hover { transform: translateY(-2px); box-shadow: 0 1px 0 var(--glass-shine) inset, 0 14px 32px var(--glass-shadow); }
        .stat-icon-wrap {
            width: 46px; height: 46px; border-radius: 13px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem;
        }
        .si-users   { background: rgba(99,185,255,0.15); border: 1px solid rgba(99,185,255,0.25); }
        .si-active  { background: rgba(77,217,172,0.15); border: 1px solid rgba(77,217,172,0.25); }
        .si-files   { background: rgba(160,80,255,0.15); border: 1px solid rgba(160,80,255,0.25); }
        .si-storage { background: rgba(255,165,0,0.15);  border: 1px solid rgba(255,165,0,0.25); }
        .stat-body { min-width: 0; }
        .stat-val {
            font-size: 1.75rem; font-weight: 700; color: var(--text-1);
            line-height: 1; letter-spacing: -0.5px;
        }
        .stat-lbl { font-size: 0.75rem; color: var(--text-3); margin-top: 4px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; }

        /* ── Middle grid ── */
        .mid-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }
        .dash-panel {
            border-radius: 18px; overflow: hidden;
            background: var(--glass-bg);
            backdrop-filter: blur(var(--glass-blur)) saturate(180%);
            -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(180%);
            border: 1px solid var(--glass-border);
            box-shadow: 0 1px 0 var(--glass-shine) inset, 0 8px 24px var(--glass-shadow);
        }
        .panel-head {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 16px; border-bottom: 1px solid var(--glass-border);
        }
        .panel-title { font-size: 0.84rem; font-weight: 600; color: var(--text-1); letter-spacing: 0.02em; }
        .panel-badge {
            font-size: 0.68rem; padding: 2px 8px;
            background: var(--accent-bg); border: 1px solid var(--accent-border);
            border-radius: 999px; color: var(--accent);
        }

        /* Activity feed */
        .act-feed { padding: 6px 0; max-height: 300px; overflow-y: auto; }
        .act-item {
            display: flex; align-items: flex-start; gap: 10px;
            padding: 10px 16px; transition: background 0.12s;
        }
        .act-item:hover { background: rgba(128,128,128,0.05); }
        .act-dot {
            width: 8px; height: 8px; border-radius: 50%;
            margin-top: 5px; flex-shrink: 0;
        }
        .dot-login  { background: #4dd9ac; box-shadow: 0 0 6px rgba(77,217,172,0.5); }
        .dot-gallery{ background: var(--accent); box-shadow: 0 0 6px var(--accent-glow); }
        .dot-upload { background: #b06cff; box-shadow: 0 0 6px rgba(160,80,255,0.5); }
        .act-info { flex: 1; min-width: 0; }
        .act-who { font-size: 0.84rem; font-weight: 600; color: var(--text-1); }
        .act-who span { font-weight: 400; color: var(--text-3); margin-left: 4px; }
        .act-sub { font-size: 0.74rem; color: var(--text-3); margin-top: 2px;
            overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
        .act-time { font-size: 0.72rem; color: var(--text-3); white-space: nowrap; flex-shrink: 0; margin-top: 2px; }
        .act-empty { padding: 40px 16px; text-align: center; color: var(--text-3); font-size: 0.86rem; }

        /* Storage bars */
        .storage-list { padding: 8px 16px 14px; display: flex; flex-direction: column; gap: 12px; }
        .sto-row { display: flex; flex-direction: column; gap: 5px; }
        .sto-top { display: flex; align-items: center; justify-content: space-between; }
        .sto-name { font-size: 0.84rem; font-weight: 500; color: var(--text-1); }
        .sto-meta { font-size: 0.72rem; color: var(--text-3); }
        .sto-bar-bg {
            height: 6px; border-radius: 3px;
            background: rgba(128,128,128,0.12);
            overflow: hidden;
        }
        .sto-bar-fill {
            height: 100%; border-radius: 3px;
            background: linear-gradient(90deg, var(--accent), rgba(160,80,255,0.8));
            transition: width 0.8s cubic-bezier(0.34,1.56,0.64,1);
            width: 0%;
        }
        .sto-empty { padding: 40px 16px; text-align: center; color: var(--text-3); font-size: 0.86rem; }

        /* ── Recent files ── */
        .files-panel {
            border-radius: 18px; overflow: hidden;
            background: var(--glass-bg);
            backdrop-filter: blur(var(--glass-blur)) saturate(180%);
            -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(180%);
            border: 1px solid var(--glass-border);
            box-shadow: 0 1px 0 var(--glass-shine) inset, 0 8px 24px var(--glass-shadow);
        }
        .files-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 8px; padding: 14px;
        }
        .file-thumb {
            aspect-ratio: 1; border-radius: 10px; overflow: hidden;
            background: rgba(128,128,128,0.08); border: 1px solid var(--glass-border);
            position: relative; cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .file-thumb:hover { transform: scale(1.03); box-shadow: 0 6px 20px var(--glass-shadow); }
        .file-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .file-thumb .vid-overlay {
            position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.35);
        }
        .file-thumb .vid-overlay svg { width: 20px; height: 20px; }
        .file-owner {
            position: absolute; bottom: 4px; left: 4px;
            font-size: 0.6rem; font-weight: 600;
            padding: 1px 5px; border-radius: 4px;
            background: rgba(0,0,0,0.6); color: white;
            backdrop-filter: blur(4px);
        }
        .files-empty { padding: 40px; text-align: center; color: var(--text-3); font-size: 0.86rem; }
        .files-loading { padding: 40px; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 12px; color: var(--text-3); }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .adm-wrap { padding: 12px 12px 48px; gap: 14px; }
            .stat-row { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .mid-grid  { grid-template-columns: 1fr; }
            .stat-card { padding: 14px; gap: 10px; }
            .stat-val  { font-size: 1.4rem; }
            .stat-icon-wrap { width: 38px; height: 38px; font-size: 1.1rem; border-radius: 10px; }
            .adm-title { font-size: 1.1rem; }
            .files-grid { grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 6px; padding: 10px; }
        }
        @media (max-width: 420px) {
            .stat-row { grid-template-columns: repeat(2, 1fr); }
            .adm-header { padding: 10px 12px; gap: 8px; }
            .adm-back span { display: none; }
            .adm-back { padding: 7px 9px; }
        }
    </style>
</head>
<body>
<div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
</div>

<div class="adm-wrap">

    <!-- Header -->
    <header class="adm-header">
        <a href="/gallery" class="adm-back">
            <svg viewBox="0 0 20 20" fill="none"><path d="M13 5l-5 5 5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <span>Gallery</span>
        </a>
        <div class="adm-title">Admin Dashboard</div>
        <div class="adm-header-right">
            <button class="adm-refresh" id="refreshBtn" onclick="loadDashboard()" title="Refresh">↻</button>
            <button class="theme-toggle-sm" onclick="toggleTheme()">
                <svg class="icon-sun" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="1.6"/><path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
                <svg class="icon-moon" viewBox="0 0 24 24" fill="none"><path d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
            </button>
        </div>
    </header>

    <!-- Stat cards -->
    <div class="stat-row">
        <div class="stat-card">
            <div class="stat-icon-wrap si-users">👥</div>
            <div class="stat-body">
                <div class="stat-val" id="sv-users">—</div>
                <div class="stat-lbl">Total Users</div>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon-wrap si-active">🟢</div>
            <div class="stat-body">
                <div class="stat-val" id="sv-active">—</div>
                <div class="stat-lbl">Active Today</div>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon-wrap si-files">🖼</div>
            <div class="stat-body">
                <div class="stat-val" id="sv-files">—</div>
                <div class="stat-lbl">Total Files</div>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon-wrap si-storage">💾</div>
            <div class="stat-body">
                <div class="stat-val" id="sv-size">—</div>
                <div class="stat-lbl">Storage Used</div>
            </div>
        </div>
    </div>

    <!-- Middle: Activity + Storage -->
    <div class="mid-grid">
        <div class="dash-panel">
            <div class="panel-head">
                <span class="panel-title">Recent Activity</span>
                <span class="panel-badge" id="actBadge">—</span>
            </div>
            <div class="act-feed" id="actFeed">
                <div class="act-empty">Loading…</div>
            </div>
        </div>

        <div class="dash-panel">
            <div class="panel-head">
                <span class="panel-title">Storage by User</span>
                <span class="panel-badge" id="stoBadge">—</span>
            </div>
            <div class="storage-list" id="stoList">
                <div class="sto-empty">Loading…</div>
            </div>
        </div>
    </div>

    <!-- Recent files -->
    <div class="files-panel">
        <div class="panel-head">
            <span class="panel-title">Recent Uploads</span>
            <span class="panel-badge" id="filesBadge">—</span>
        </div>
        <div id="fileGrid" class="files-loading">
            <div class="loading-spinner"></div>
            <span>Loading files…</span>
        </div>
    </div>

</div>

<script>
function toggleTheme() {
    const next = (document.documentElement.getAttribute('data-theme') || 'dark') === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('mv-theme', next);
}

function fmtSize(b) {
    if (b < 1024)          return b + ' B';
    if (b < 1048576)       return (b/1024).toFixed(1) + ' KB';
    if (b < 1073741824)    return (b/1048576).toFixed(1) + ' MB';
    return (b/1073741824).toFixed(2) + ' GB';
}

function timeAgo(ts) {
    const s = Math.floor((Date.now() - new Date(ts)) / 1000);
    if (s < 60)   return s + 's ago';
    if (s < 3600) return Math.floor(s/60) + 'm ago';
    if (s < 86400)return Math.floor(s/3600) + 'h ago';
    return Math.floor(s/86400) + 'd ago';
}

function countUp(el, target, duration = 700) {
    const start = performance.now();
    const from  = parseInt(el.textContent) || 0;
    (function frame(now) {
        const t = Math.min((now - start) / duration, 1);
        const ease = 1 - Math.pow(1 - t, 3);
        el.textContent = Math.round(from + (target - from) * ease);
        if (t < 1) requestAnimationFrame(frame);
    })(start);
}

function renderActivity(events) {
    const feed = document.getElementById('actFeed');
    document.getElementById('actBadge').textContent = events.length + ' events';
    if (!events.length) { feed.innerHTML = '<div class="act-empty">No activity recorded yet</div>'; return; }
    const dotClass = { login:'dot-login', gallery:'dot-gallery', upload:'dot-upload' };
    feed.innerHTML = events.map(e => `
        <div class="act-item">
            <div class="act-dot ${dotClass[e.action]||'dot-gallery'}"></div>
            <div class="act-info">
                <div class="act-who">${e.user}<span>${e.action}</span></div>
                <div class="act-sub">${e.device} · ${e.ip}</div>
            </div>
            <div class="act-time">${timeAgo(e.ts)}</div>
        </div>`).join('');
}

function renderStorage(userStats) {
    const list = document.getElementById('stoList');
    const entries = Object.entries(userStats).sort((a,b) => b[1].size - a[1].size);
    if (!entries.length) { list.innerHTML = '<div class="sto-empty">No data</div>'; return; }
    const maxSize = Math.max(...entries.map(e => e[1].size), 1);
    document.getElementById('stoBadge').textContent = entries.length + ' users';
    list.innerHTML = entries.map(([name, s]) => {
        const pct = Math.round((s.size / maxSize) * 100);
        return `
        <div class="sto-row">
            <div class="sto-top">
                <span class="sto-name">${name}</span>
                <span class="sto-meta">${s.files} file${s.files!==1?'s':''} · ${fmtSize(s.size)}</span>
            </div>
            <div class="sto-bar-bg">
                <div class="sto-bar-fill" data-pct="${pct}" style="width:0%"></div>
            </div>
        </div>`;
    }).join('');
    requestAnimationFrame(() => {
        document.querySelectorAll('.sto-bar-fill').forEach(b => {
            b.style.width = b.dataset.pct + '%';
        });
    });
}

function renderFiles(paths) {
    const grid = document.getElementById('fileGrid');
    document.getElementById('filesBadge').textContent = paths.length + ' recent';
    if (!paths.length) { grid.className = ''; grid.innerHTML = '<div class="files-empty">No files uploaded yet</div>'; return; }
    grid.className = 'files-grid';
    const isVideo = p => /\.(mp4|webm|mkv)$/i.test(p);
    grid.innerHTML = paths.map(p => {
        const owner = p.split('/')[0];
        const url   = `/media/${p}`;
        return isVideo(p)
            ? `<div class="file-thumb" onclick="window.open('${url}')">
                   <div class="vid-overlay"><svg viewBox="0 0 24 24" fill="none"><polygon points="6,4 20,12 6,20" fill="white"/></svg></div>
                   <div class="file-owner">${owner}</div>
               </div>`
            : `<div class="file-thumb" onclick="window.open('${url}')">
                   <img src="${url}" loading="lazy" decoding="async">
                   <div class="file-owner">${owner}</div>
               </div>`;
    }).join('');
}

async function loadDashboard() {
    const btn = document.getElementById('refreshBtn');
    btn.classList.add('spinning');
    try {
        const res  = await fetch('/api/admin/stats');
        if (res.status === 403) { location.href = '/gallery'; return; }
        const data = await res.json();

        countUp(document.getElementById('sv-users'),  data.total_users);
        countUp(document.getElementById('sv-active'), data.active_today);
        countUp(document.getElementById('sv-files'),  data.total_files);
        document.getElementById('sv-size').textContent = fmtSize(data.total_size);

        renderActivity(data.recent_activity);
        renderStorage(data.user_stats);
        renderFiles(data.recent_files);
    } catch(e) {
        console.error(e);
    } finally {
        btn.classList.remove('spinning');
    }
}

loadDashboard();
</script>
</body>
</html>
