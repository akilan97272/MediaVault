<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>404 — Page Not Found</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link
            href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700&family=Instrument+Serif:ital@1&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="/static/style.css" />
        <script>
            (function () {
                const t = localStorage.getItem("mv-theme") || "dark";
                document.documentElement.setAttribute("data-theme", t);
            })();
        </script>
        <style>
            .not-found-wrap {
                position: relative;
                z-index: 1;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                min-height: 100dvh;
                padding: 24px;
                text-align: center;
                gap: 0;
            }

            .nf-card {
                max-width: 420px;
                width: 100%;
                border-radius: 28px;
                padding: 48px 40px 40px;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 12px;
            }

            .nf-code {
                font-family: "Instrument Serif", Georgia, serif;
                font-style: italic;
                font-size: clamp(5rem, 20vw, 7rem);
                font-weight: 400;
                line-height: 1;
                background: linear-gradient(
                    135deg,
                    var(--accent) 0%,
                    rgba(160, 80, 255, 0.9) 100%
                );
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
                letter-spacing: -2px;
                margin-bottom: 4px;
            }

            .nf-title {
                font-size: 1.25rem;
                font-weight: 600;
                color: var(--text-1);
                margin-bottom: 4px;
            }

            .nf-desc {
                font-size: 0.92rem;
                color: var(--text-2);
                line-height: 1.6;
                max-width: 300px;
            }

            .nf-divider {
                width: 40px;
                height: 1px;
                background: var(--glass-border);
                margin: 8px 0;
            }

            .nf-btn {
                display: inline-flex;
                align-items: center;
                gap: 8px;
                margin-top: 12px;
                padding: 12px 24px;
                background: var(--accent-bg);
                border: 1px solid var(--accent-border);
                border-radius: 999px;
                color: var(--accent);
                font-size: 0.9rem;
                font-weight: 600;
                font-family: inherit;
                text-decoration: none;
                cursor: pointer;
                transition:
                    background 0.2s,
                    transform 0.15s,
                    box-shadow 0.2s;
                backdrop-filter: blur(8px);
            }

            .nf-btn:hover {
                background: rgba(99, 185, 255, 0.2);
                transform: translateY(-1px);
                box-shadow: 0 4px 20px var(--accent-glow);
            }

            .nf-btn:active {
                transform: scale(0.97);
            }

            .nf-btn svg {
                width: 16px;
                height: 16px;
            }

            .nf-lock {
                width: 56px;
                height: 56px;
                background: var(--glass-bg);
                border: 1px solid var(--glass-border);
                border-radius: 16px;
                display: flex;
                align-items: center;
                justify-content: center;
                margin-bottom: 8px;
                box-shadow: 0 1px 0 var(--glass-shine) inset;
            }

            .nf-lock svg {
                width: 26px;
                height: 26px;
                color: var(--text-3);
            }
        </style>
    </head>
    <body>
        <div class="bg-orbs">
            <div class="orb orb-1"></div>
            <div class="orb orb-2"></div>
            <div class="orb orb-3"></div>
        </div>

        <div class="not-found-wrap">
            <div class="glass-card nf-card">
                <div class="nf-lock">
                    <svg viewBox="0 0 24 24" fill="none">
                        <rect
                            x="5"
                            y="11"
                            width="14"
                            height="10"
                            rx="2"
                            stroke="currentColor"
                            stroke-width="1.5"
                        />
                        <path
                            d="M8 11V7a4 4 0 118 0v4"
                            stroke="currentColor"
                            stroke-width="1.5"
                            stroke-linecap="round"
                        />
                        <circle cx="12" cy="16" r="1.2" fill="currentColor" />
                    </svg>
                </div>

                <div class="nf-code">404</div>

                <p class="nf-title">Page not found</p>

                <div class="nf-divider"></div>

                <p class="nf-desc">
                    This page doesn't exist or your session has expired. Please
                    sign in to access your gallery.
                </p>

                <a href="/" class="nf-btn">
                    <svg viewBox="0 0 20 20" fill="none">
                        <path
                            d="M4 10h12M11 5l5 5-5 5"
                            stroke="currentColor"
                            stroke-width="1.5"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        />
                    </svg>
                    Go to Sign In
                </a>
            </div>
        </div>
    </body>
</html>
